services:
  postgres:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=kossti
      - POSTGRES_INITDB_ARGS=--auth-host=md5
    ports:
      - "5428:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d kossti"]
      interval: 10s
      timeout: 5s
      retries: 3